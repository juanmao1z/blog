{{ define "main" }}
  <article class="article">
    <header class="article-header">
      <p class="eyebrow">{{ .Date.Format "2006-01-02" }}</p>
      <h1>{{ .Title }}</h1>
      {{ with .Description }}<p>{{ . }}</p>{{ end }}
    </header>
    <div class="article-body">
      {{ .Content }}
    </div>
  </article>
{{ end }}
